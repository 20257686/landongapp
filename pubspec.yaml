publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  dio: ^5.4.0
  go_router: ^13.0.0
  cached_network_image: ^3.3.1
  easy_refresh: ^3.4.0
  photo_view: ^0.14.0
  webview_flutter: ^4.4.4
  shared_preferences: ^2.2.2
  flutter_svg: ^2.0.9
  intl: ^0.18.1
  url_launcher: ^6.2.4
  package_info_plus: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
