name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true
    
    - name: Create full Flutter project
      run: |
        # 创建完整的Flutter项目（包含android目录）
        flutter create --org cn.landong --project-name landong_app /tmp/full_project
        
        # 复制我们的业务代码进去
        cp -r lib /tmp/full_project/
        cp pubspec.yaml /tmp/full_project/
        if [ -d "assets" ]; then cp -r assets /tmp/full_project/; fi
        cd /tmp/full_project
        
        # 确保assets目录存在（避免pubspec报错）
        mkdir -p assets/images
        touch assets/images/.gitkeep
        
        # 覆盖settings.gradle以使用正确的Kotlin版本
        cat > android/settings.gradle << 'GRADLE'
        pluginManagement {
            def flutterSdkPath = {
                def properties = new Properties()
                file("local.properties").withInputStream { properties.load(it) }
                def flutterSdkPath = properties.getProperty("flutter.sdk")
                assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                return flutterSdkPath
            }()

            includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }

        plugins {
            id "dev.flutter.flutter-plugin-loader" version "1.0.0"
            id "com.android.application" version "8.1.0" apply false
            id "org.jetbrains.kotlin.android" version "1.9.24" apply false
        }

        include ":app"
        GRADLE
    
    - name: Get dependencies
      run: |
        cd /tmp/full_project
        flutter pub get
    
    - name: Build APK (release)
      run: |
        cd /tmp/full_project
        flutter build apk --release
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: landong-app-release
        path: /tmp/full_project/build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
